<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 920" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1520"/>
      <stop offset="100%" style="stop-color:#1a2535"/>
    </linearGradient>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FF9900"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="920" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="700" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#FF9900">AdventureConnect — Full Stack Architecture</text>
  <text x="700" y="52" text-anchor="middle" font-size="12" fill="#64748b">AWS Serverless · Terraform · CI/CD · OIDC · 6 Sprints</text>
  <line x1="40" y1="62" x2="1360" y2="62" stroke="#FF9900" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- ======= CI/CD ZONE ======= -->
  <!-- Box positions: GitHub x=50, Actions x=270, OIDC x=530, RemoteState x=800 -->
  <!-- Gaps between boxes: ~70px each -->
  <rect x="40" y="70" width="940" height="195" rx="8" fill="#0f1e10" fill-opacity="0.9" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="510" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#22c55e">CI/CD PIPELINE — Sprint 6</text>

  <!-- GitHub x=60 w=150 -->
  <rect x="60" y="103" width="150" height="130" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <rect x="60" y="103" width="150" height="28" rx="8" fill="#24292e"/>
  <rect x="60" y="119" width="150" height="12" fill="#24292e"/>
  <text x="135" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="white">GitHub</text>
  <text x="135" y="150" text-anchor="middle" font-size="11" fill="#94a3b8">push / PR</text>
  <text x="135" y="166" text-anchor="middle" font-size="11" fill="#94a3b8">main branch</text>
  <text x="135" y="212" text-anchor="middle" font-size="10" fill="#475569">Sprint 6</text>

  <!-- Arrow GitHub → Actions: x1=210 x2=270 midpoint=240 -->
  <line x1="210" y1="168" x2="268" y2="168" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="239" y="158" text-anchor="middle" font-size="10" fill="#22c55e">trigger</text>

  <!-- GitHub Actions x=270 w=190 -->
  <rect x="270" y="103" width="190" height="150" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <rect x="270" y="103" width="190" height="28" rx="8" fill="#1a7f37"/>
  <rect x="270" y="119" width="190" height="12" fill="#1a7f37"/>
  <text x="365" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="white">GitHub Actions</text>
  <text x="365" y="150" text-anchor="middle" font-size="11" fill="#86efac">Plan job (PR)</text>
  <text x="365" y="166" text-anchor="middle" font-size="10" fill="#94a3b8">fmt · validate · plan · posts to PR</text>
  <text x="365" y="184" text-anchor="middle" font-size="11" fill="#86efac">Apply job (main)</text>
  <text x="365" y="200" text-anchor="middle" font-size="10" fill="#94a3b8">terraform apply</text>
  <text x="365" y="237" text-anchor="middle" font-size="10" fill="#475569">Sprint 6</text>

  <!-- Arrow Actions → OIDC: x1=460 x2=530 midpoint=495 -->
  <line x1="460" y1="168" x2="528" y2="168" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowYellow)"/>
  <text x="494" y="157" text-anchor="middle" font-size="10" fill="#fbbf24">OIDC token</text>

  <!-- OIDC x=530 w=200 -->
  <rect x="530" y="103" width="200" height="150" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <rect x="530" y="103" width="200" height="28" rx="8" fill="#92400e"/>
  <rect x="530" y="119" width="200" height="12" fill="#92400e"/>
  <text x="630" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="white">OIDC + IAM Role</text>
  <text x="630" y="150" text-anchor="middle" font-size="11" fill="#fde68a">GitHub OIDC Provider</text>
  <text x="630" y="166" text-anchor="middle" font-size="10" fill="#94a3b8">AssumeRoleWithWebIdentity</text>
  <text x="630" y="182" text-anchor="middle" font-size="10" fill="#94a3b8">No static credentials</text>
  <text x="630" y="198" text-anchor="middle" font-size="10" fill="#94a3b8">Repo-scoped · short-lived tokens</text>
  <text x="630" y="237" text-anchor="middle" font-size="10" fill="#475569">Sprint 6</text>

  <!-- Arrow OIDC → Remote State: x1=730 x2=800 midpoint=765 -->
  <line x1="730" y1="168" x2="798" y2="168" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowYellow)"/>
  <text x="764" y="157" text-anchor="middle" font-size="10" fill="#fbbf24">AWS creds</text>

  <!-- Remote State x=800 w=165 -->
  <rect x="800" y="103" width="165" height="150" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <rect x="800" y="103" width="165" height="28" rx="8" fill="#92400e"/>
  <rect x="800" y="119" width="165" height="12" fill="#92400e"/>
  <text x="882" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="white">Remote State</text>
  <text x="882" y="150" text-anchor="middle" font-size="11" fill="#fde68a">S3 Backend</text>
  <text x="882" y="166" text-anchor="middle" font-size="10" fill="#94a3b8">terraform.tfstate</text>
  <text x="882" y="184" text-anchor="middle" font-size="11" fill="#fde68a">DynamoDB Lock</text>
  <text x="882" y="200" text-anchor="middle" font-size="10" fill="#94a3b8">Prevents concurrent apply</text>
  <text x="882" y="237" text-anchor="middle" font-size="10" fill="#475569">Sprint 6</text>

  <!-- Arrow Actions → down to infra: from bottom of Actions box -->
  <line x1="365" y1="253" x2="365" y2="305" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="395" y="283" font-size="10" fill="#22c55e">terraform apply</text>

  <!-- ======= PAGE LOAD FLOW ======= -->
  <rect x="40" y="293" width="560" height="24" rx="4" fill="#1e3a5f" fill-opacity="0.7"/>
  <text x="320" y="309" text-anchor="middle" font-size="11" font-weight="600" fill="#38bdf8">PAGE LOAD FLOW</text>

  <!-- Users x=40 w=110 -->
  <rect x="40" y="330" width="110" height="85" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="95" y="365" text-anchor="middle" font-size="24">👤</text>
  <text x="95" y="400" text-anchor="middle" font-size="13" font-weight="600" fill="#e2e8f0">Users</text>

  <!-- Arrow Users → CloudFront: x1=150 x2=210 -->
  <line x1="150" y1="370" x2="208" y2="370" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="179" y="359" text-anchor="middle" font-size="10" fill="#38bdf8">HTTPS</text>

  <!-- CloudFront x=210 w=155 -->
  <rect x="210" y="320" width="155" height="100" rx="8" fill="#1e293b" stroke="#7c3aed" stroke-width="2"/>
  <rect x="210" y="320" width="155" height="28" rx="8" fill="#7c3aed"/>
  <rect x="210" y="336" width="155" height="12" fill="#7c3aed"/>
  <text x="287" y="339" text-anchor="middle" font-size="12" font-weight="700" fill="white">CloudFront</text>
  <text x="287" y="368" text-anchor="middle" font-size="11" fill="#94a3b8">HTTPS · CDN · OAC</text>
  <text x="287" y="385" text-anchor="middle" font-size="11" fill="#475569">Sprint 4</text>

  <!-- Arrow CloudFront → S3: x1=365 x2=430 -->
  <line x1="365" y1="368" x2="428" y2="368" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="396" y="357" text-anchor="middle" font-size="10" fill="#38bdf8">OAC signed</text>

  <!-- S3 x=430 w=155 -->
  <rect x="430" y="320" width="155" height="100" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <rect x="430" y="320" width="155" height="28" rx="8" fill="#16a34a"/>
  <rect x="430" y="336" width="155" height="12" fill="#16a34a"/>
  <text x="507" y="339" text-anchor="middle" font-size="12" font-weight="700" fill="white">Amazon S3</text>
  <text x="507" y="368" text-anchor="middle" font-size="11" fill="#94a3b8">Static Website · Private</text>
  <text x="507" y="385" text-anchor="middle" font-size="11" fill="#475569">Sprint 4</text>

  <!-- Cached response arc -->
  <path d="M507,320 Q507,290 287,290 Q200,290 150,365" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="330" y="282" text-anchor="middle" font-size="10" fill="#38bdf8">index.html (cached)</text>

  <!-- ======= FORM SUBMIT FLOW ======= -->
  <!-- Box positions: APIgw x=200, Lambda x=430, DynamoDB x=660, notifLambda x=660(lower), SES x=430(lower) -->
  <!-- Gaps = 230px wide boxes with 30px gaps -->
  <rect x="40" y="450" width="830" height="24" rx="4" fill="#3a1f00" fill-opacity="0.7"/>
  <text x="455" y="466" text-anchor="middle" font-size="11" font-weight="600" fill="#FF9900">FORM SUBMIT FLOW</text>

  <!-- Arrow Users → API GW (vertical then horizontal) -->
  <line x1="95" y1="415" x2="95" y2="530" stroke="#FF9900" stroke-width="2"/>
  <line x1="95" y1="530" x2="198" y2="530" stroke="#FF9900" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="65" y="480" font-size="10" fill="#FF9900" transform="rotate(-90,65,480)">POST JSON</text>

  <!-- API Gateway x=200 w=160 -->
  <rect x="200" y="488" width="160" height="90" rx="8" fill="#1e293b" stroke="#FF9900" stroke-width="2"/>
  <rect x="200" y="488" width="160" height="28" rx="8" fill="#b45309"/>
  <rect x="200" y="504" width="160" height="12" fill="#b45309"/>
  <text x="280" y="507" text-anchor="middle" font-size="12" font-weight="700" fill="white">API Gateway</text>
  <text x="280" y="535" text-anchor="middle" font-size="11" fill="#94a3b8">REST · CORS · Rate Limit</text>
  <text x="280" y="552" text-anchor="middle" font-size="11" fill="#475569">Sprint 2</text>

  <!-- Arrow API GW → Lambda: x1=360 x2=420 -->
  <line x1="360" y1="533" x2="418" y2="533" stroke="#FF9900" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Lambda contact x=420 w=165 -->
  <rect x="420" y="488" width="165" height="90" rx="8" fill="#1e293b" stroke="#FF9900" stroke-width="2"/>
  <rect x="420" y="488" width="165" height="28" rx="8" fill="#b45309"/>
  <rect x="420" y="504" width="165" height="12" fill="#b45309"/>
  <text x="502" y="507" text-anchor="middle" font-size="12" font-weight="700" fill="white">Lambda</text>
  <text x="502" y="535" text-anchor="middle" font-size="11" fill="#94a3b8">contact-handler</text>
  <text x="502" y="552" text-anchor="middle" font-size="11" fill="#475569">Sprint 1</text>

  <!-- Arrow Lambda → DynamoDB: x1=585 x2=650 -->
  <line x1="585" y1="533" x2="648" y2="533" stroke="#FF9900" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="616" y="522" text-anchor="middle" font-size="10" fill="#FF9900">PutItem</text>

  <!-- DynamoDB x=650 w=165 -->
  <rect x="650" y="488" width="165" height="90" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <rect x="650" y="488" width="165" height="28" rx="8" fill="#1d4ed8"/>
  <rect x="650" y="504" width="165" height="12" fill="#1d4ed8"/>
  <text x="732" y="507" text-anchor="middle" font-size="12" font-weight="700" fill="white">DynamoDB</text>
  <text x="732" y="535" text-anchor="middle" font-size="11" fill="#94a3b8">Streams · PAY_PER_REQUEST</text>
  <text x="732" y="552" text-anchor="middle" font-size="11" fill="#475569">Sprint 1</text>

  <!-- Arrow DynamoDB → Lambda notification (down) -->
  <line x1="732" y1="578" x2="732" y2="638" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="755" y="612" font-size="10" fill="#22c55e">INSERT event</text>

  <!-- Lambda notification x=650 w=165 -->
  <rect x="650" y="640" width="165" height="90" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <rect x="650" y="640" width="165" height="28" rx="8" fill="#15803d"/>
  <rect x="650" y="656" width="165" height="12" fill="#15803d"/>
  <text x="732" y="659" text-anchor="middle" font-size="12" font-weight="700" fill="white">Lambda</text>
  <text x="732" y="685" text-anchor="middle" font-size="11" fill="#94a3b8">notification-handler</text>
  <text x="732" y="702" text-anchor="middle" font-size="11" fill="#475569">Sprint 3</text>

  <!-- Arrow notification → SES: x1=650 x2=585 -->
  <line x1="650" y1="685" x2="587" y2="685" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="618" y="674" text-anchor="middle" font-size="10" fill="#22c55e">SendEmail</text>

  <!-- SES x=420 w=165 -->
  <rect x="420" y="640" width="165" height="90" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <rect x="420" y="640" width="165" height="28" rx="8" fill="#15803d"/>
  <rect x="420" y="656" width="165" height="12" fill="#15803d"/>
  <text x="502" y="659" text-anchor="middle" font-size="12" font-weight="700" fill="white">Amazon SES</text>
  <text x="502" y="685" text-anchor="middle" font-size="11" fill="#94a3b8">Email Delivery</text>
  <text x="502" y="702" text-anchor="middle" font-size="11" fill="#475569">Sprint 3</text>

  <!-- Arrow SES → Users -->
  <line x1="420" y1="685" x2="200" y2="685" stroke="#22c55e" stroke-width="2"/>
  <line x1="200" y1="685" x2="95" y2="425" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="240" y="676" text-anchor="middle" font-size="10" fill="#22c55e">Email notification</text>

  <!-- ======= MONITORING ZONE ======= -->
  <rect x="1050" y="293" width="310" height="500" rx="8" fill="#1a1a2e" fill-opacity="0.9" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="1205" y="315" text-anchor="middle" font-size="12" font-weight="700" fill="#a78bfa">MONITORING — Sprint 5</text>

  <!-- CloudWatch x=1065 w=280 -->
  <rect x="1065" y="328" width="280" height="130" rx="8" fill="#1e293b" stroke="#7c3aed" stroke-width="2"/>
  <rect x="1065" y="328" width="280" height="28" rx="8" fill="#6d28d9"/>
  <rect x="1065" y="344" width="280" height="12" fill="#6d28d9"/>
  <text x="1205" y="347" text-anchor="middle" font-size="12" font-weight="700" fill="white">CloudWatch</text>
  <text x="1205" y="376" text-anchor="middle" font-size="11" fill="#c4b5fd">8 Metric Alarms</text>
  <text x="1205" y="393" text-anchor="middle" font-size="10" fill="#94a3b8">Lambda (x2) · API Gateway · DynamoDB</text>
  <text x="1205" y="410" text-anchor="middle" font-size="10" fill="#94a3b8">Errors · Duration · Latency · Throttle</text>
  <text x="1205" y="438" text-anchor="middle" font-size="10" fill="#475569">Sprint 5</text>

  <!-- Arrow CW → SNS -->
  <line x1="1205" y1="458" x2="1205" y2="518" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="1225" y="492" font-size="10" fill="#a78bfa">alarm</text>

  <!-- SNS x=1065 w=280 -->
  <rect x="1065" y="520" width="280" height="100" rx="8" fill="#1e293b" stroke="#7c3aed" stroke-width="2"/>
  <rect x="1065" y="520" width="280" height="28" rx="8" fill="#6d28d9"/>
  <rect x="1065" y="536" width="280" height="12" fill="#6d28d9"/>
  <text x="1205" y="539" text-anchor="middle" font-size="12" font-weight="700" fill="white">SNS Topic</text>
  <text x="1205" y="568" text-anchor="middle" font-size="11" fill="#94a3b8">adventureconnect-alerts</text>
  <text x="1205" y="585" text-anchor="middle" font-size="10" fill="#94a3b8">Email subscription · Fan-out capable</text>
  <text x="1205" y="602" text-anchor="middle" font-size="10" fill="#475569">Sprint 5</text>

  <!-- Arrow SNS → Email -->
  <line x1="1205" y1="620" x2="1205" y2="672" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="1225" y="650" font-size="10" fill="#a78bfa">notify</text>

  <!-- Alert Email -->
  <rect x="1140" y="672" width="130" height="65" rx="8" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="1205" y="703" text-anchor="middle" font-size="24">📧</text>
  <text x="1205" y="728" text-anchor="middle" font-size="11" fill="#94a3b8">Alert Email</text>

  <!-- Metric dashed lines (4 lines) -->
  <!-- API GW → CW -->
  <line x1="280" y1="488" x2="280" y2="440" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="280" y1="440" x2="1065" y2="393" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>

  <!-- contact-handler Lambda → CW -->
  <line x1="502" y1="488" x2="502" y2="450" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="502" y1="450" x2="1065" y2="393" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>

  <!-- DynamoDB → CW -->
  <line x1="815" y1="510" x2="1065" y2="400" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>

  <!-- notification-handler Lambda → CW -->
  <line x1="815" y1="670" x2="1065" y2="415" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>

  <text x="960" y="430" text-anchor="middle" font-size="10" fill="#a78bfa">metrics</text>

  <!-- ======= LEGEND ======= -->
  <rect x="40" y="805" width="1050" height="90" rx="8" fill="#1e293b" fill-opacity="0.5" stroke="#334155" stroke-width="1"/>
  <text x="565" y="825" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">Legend</text>

  <line x1="60" y1="845" x2="95" y2="845" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="165" y="849" font-size="11" fill="#94a3b8">Page load flow</text>

  <line x1="260" y1="845" x2="295" y2="845" stroke="#FF9900" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="368" y="849" font-size="11" fill="#94a3b8">Form submit flow</text>

  <line x1="468" y1="845" x2="503" y2="845" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="575" y="849" font-size="11" fill="#94a3b8">Event-driven flow</text>

  <line x1="675" y1="845" x2="710" y2="845" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>
  <text x="775" y="849" font-size="11" fill="#94a3b8">Metrics flow</text>

  <line x1="865" y1="845" x2="900" y2="845" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowYellow)"/>
  <text x="970" y="849" font-size="11" fill="#94a3b8">CI/CD · OIDC</text>

  <text x="565" y="882" text-anchor="middle" font-size="11" fill="#334155">eu-central-1 · Frankfurt · Infrastructure as Code (Terraform) · No static AWS credentials</text>
</svg>
